_schema-version: "3.1"
ID: test.add.basic
version: 1.0.0
description: basic mta test app
parameters:
  enable-parallel-deployments: true
modules:
  - name: test-add-basic-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: test-add-basic-db
      - name: test-add-basic-auth
resources:
  - name: test-add-basic-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: test-add-basic-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      config:
        xsappname: test-add-basic-${org}-${space}
        tenant-mode: dedicated
