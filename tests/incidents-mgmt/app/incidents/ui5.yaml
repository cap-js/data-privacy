specVersion: "4.0"
metadata:
  name: capire.dpp.sample.incidents
type: application
resources:
  configuration:
    propertiesFileSourceEncoding: UTF-8
builder:
  resources:
    excludes:
      - "/test/**"
      - "/localService/**"
  customTasks:
    - name: ui5-task-zipper
      afterTask: generateCachebusterInfo
      configuration:
        archiveName: incidents
        relativePaths: false
        additionalFiles:
          - xs-app.json
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion
      # configuration:
      # debug: true

server:
  customMiddleware:
    - name: fiori-tools-appreload
      afterMiddleware: compression
    - name: ui5-tooling-transpile-middleware
      afterMiddleware: compression
      configuration:
        # debug: true
        excludePatterns:
          - /Component-preload.js
