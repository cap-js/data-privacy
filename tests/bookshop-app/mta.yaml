_schema-version: "3.1"
ID: bookshop
version: 1.0.0
description: DPI testing bookshop
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - node deploy-patches.js apply
        - npm pack ../../
        - sh -c 'TGZ_FILE="$(ls -1 | grep -E "^cap-js-data-privacy.*\.tgz$" | head -n 1)" && npm install "./${TGZ_FILE}"'
        - npm ci
        - npx -p @sap/cds-dk cds build --production
        - sh -c 'cp "$(ls -1 | grep -E "^cap-js-data-privacy.*\.tgz$" | head -n 1)" ./gen/srv'
  after-all:
    - builder: custom
      commands:
        - node deploy-patches.js revert
modules:
  - name: bookshop-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      routes:
        - route: "${default-url}"
        - route: "${default-host}.cert.${default-domain}"
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
          srv-cert-url: '${protocol}://${default-host}.cert.${default-domain}'
    requires:
      - name: bookshop-db
      - name: bookshop-auth
      - name: bookshop-cf-logging
      - name: bookshop-auditlog
      - name: bookshop-information
      - name: bookshop-retention
      - name: bookshop-ias
        parameters:
          config:
            credential-type: X509_GENERATED
            app-identifier: srv
    deployed-after:
      - gdpr-ams-policies-deployer
    properties:
      AMS_DCL_ROOT: ams/dcl
  - name: bookshop-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: bookshop-db
      - name: bookshop-auth
      - name: bookshop-cf-logging

  - name: gdpr-ams-policies-deployer
    type: javascript.nodejs
    path: gen/policies
    parameters:
      buildpack: nodejs_buildpack
      no-route: true
      no-start: true
      tasks:
        - name: deploy-dcl
          command: npm start
          memory: 512M
    requires:
      - name: bookshop-ias
        parameters:
          config:
            credential-type: X509_GENERATED
            app-identifier: ams-policy-deployer

  - name: bookshop
    type: approuter.nodejs
    path: app/router
    requires:
      - name: bookshop-ias
        parameters:
          config:
            credential-type: X509_GENERATED
            app-identifier: approuter
      - name: srv-api
        group: destinations
        properties:
          url: ~{srv-cert-url}
          forwardAuthCertificates: true
          forwardAuthToken: true
          strictSSL: true
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}
resources:
  - name: bookshop-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: bookshop-auth
    type: org.cloudfoundry.managed-service
    processed-after:
      - bookshop-information
      - bookshop-retention
    parameters:
      service: xsuaa
      service-plan: application
      config:
        xsappname: bookshop-${org}-${space}
        tenant-mode: dedicated
        scopes:
          - name: $XSAPPNAME.PersonalDataManagerUser
            description: Technical scope to restrict access to information endpoint
            grant-as-authority-to-apps:
              - $XSSERVICENAME(bookshop-information)
          - name: $XSAPPNAME.DataRetentionManagerUser
            description: Technical scope to restrict access to retention endpoint
            grant-as-authority-to-apps:
              - $XSSERVICENAME(bookshop-retention)
  - name: bookshop-cf-logging
    type: org.cloudfoundry.managed-service
    parameters:
      service: application-logs
      service-plan: lite
  - name: bookshop-information
    type: org.cloudfoundry.managed-service
    requires:
      - name: srv-api
    parameters:
      service-name: bookshop-information
      service: data-privacy-integration-service
      service-plan: data-privacy-internal
      config:
        xs-security:
          xsappname: bookshop-information-${org}-${space}
          authorities:
            - $ACCEPT_GRANTED_AUTHORITIES
        dataPrivacyConfiguration:
          configType: information
          applicationConfiguration:
            applicationName: bookshop-information
            applicationTitle: bookshop
            enableAutoSubscription: true
          informationConfiguration:
            applicationConfiguration:
              dataSubjectDeletionAgent: retention-manager
              retentionApplicationName: bookshop-retention
              disableDataSubjectCorrection: true
              cacheControl: no-cache
            components:
              - componentName: bookshop-srv
                componentBaseURL: ~{srv-api/srv-url}
                serviceEndPoints:
                  - serviceName: bookshop-service
                    serviceFormat: odata-v4
                    annotationFormat: v4
                    serviceEndPoint: /dpp/information
                    appPaginationEnabled: true
                    cacheControl: no-cache
  - name: bookshop-retention
    type: org.cloudfoundry.managed-service
    requires:
      - name: srv-api
    parameters:
      service-name: bookshop-retention
      service: data-privacy-integration-service
      service-plan: data-privacy-internal
      config:
        xs-security:
          xsappname: bookshop-retention-${org}-${space}
          authorities:
            - $ACCEPT_GRANTED_AUTHORITIES
        dataPrivacyConfiguration:
          configType: retention
          applicationConfiguration:
            applicationName: bookshop-retention
            applicationDescription: bookshop-retention
            applicationDescriptionKey: APPLICATION_NAME
            applicationBaseURL: ~{srv-api/srv-url}
            applicationTitle: bookshop
            enableAutoSubscription: true
          translationConfiguration:
            textBundleEndPoint: /dpp/retention/i18n-files/i18n.properties
            defaultLanguage: en
            supportedLanguages:
              - de
              - fr
              - es
              - en
            textBundleBaseURL: ~{srv-api/srv-url}
          retentionConfiguration:
            applicationConfiguration:
              applicationType: TransactionMaster
              iLMObjectDiscoveryEndPoint: /dpp/retention/iLMObjects
            dataSubjectRoles:
              - dataSubjectRoleName: Employee
                dataSubjectDescription: Employee
                dataSubjectBaseURL: ~{srv-api/srv-url}
                dataSubjectBlockingEndPoint: /dpp/retention/dataSubjectBlocking
                dataSubjectInformationEndPoint: /dpp/retention/dataSubjectInformation
                dataSubjectsDestroyingEndPoint: /dpp/retention/dataSubjectsDestroying
              - dataSubjectRoleName: Customer
                dataSubjectDescription: Customer
                dataSubjectBaseURL: ~{srv-api/srv-url}
                dataSubjectBlockingEndPoint: /dpp/retention/dataSubjectBlocking
                dataSubjectInformationEndPoint: /dpp/retention/dataSubjectInformation
                dataSubjectsDestroyingEndPoint: /dpp/retention/dataSubjectsDestroying
              - dataSubjectRoleName: Student
                dataSubjectDescription: Student
                dataSubjectBaseURL: ~{srv-api/srv-url}
                dataSubjectBlockingEndPoint: /dpp/retention/dataSubjectBlocking
                dataSubjectInformationEndPoint: /dpp/retention/dataSubjectInformation
                dataSubjectsDestroyingEndPoint: /dpp/retention/dataSubjectsDestroying
            organizationAttributes:
              - organizationAttributeName: sap.ilm.RetentionService.LegalEntities
                organizationAttributeDescription: LegalEntity
                organizationAttributeBaseURL: ~{srv-api/srv-url}
                organizationAttributeValueHelpEndPoint: /dpp/retention/valueHelp_orgAttribute_sap_ilm_RetentionService_LegalEntities
              - organizationAttributeName: test.dpp.university.Universities
                organizationAttributeDescription: sap.ilm.RetentionService.valueHelp_orgAttribute_test_dpp_university_Universities
                organizationAttributeBaseURL: ~{srv-api/srv-url}
                organizationAttributeValueHelpEndPoint: /dpp/retention/valueHelp_orgAttribute_test_dpp_university_Universities
              - organizationAttributeName: Universities
                organizationAttributeDescription: sap.ilm.RetentionService.valueHelp_orgAttribute_Universities
                organizationAttributeBaseURL: ~{srv-api/srv-url}
                organizationAttributeValueHelpEndPoint: /dpp/retention/valueHelp_orgAttribute_Universities
              - organizationAttributeName: universityStr
                organizationAttributeDescription: sap.ilm.RetentionService.valueHelp_orgAttribute_sap_ilm_RetentionService_ErasmusApplications_universityStr
                organizationAttributeBaseURL: ~{srv-api/srv-url}
                organizationAttributeValueHelpEndPoint: /dpp/retention/valueHelp_orgAttribute_sap_ilm_RetentionService_ErasmusApplications_universityStr
  - name: bookshop-auditlog
    type: org.cloudfoundry.managed-service
    parameters:
      service: auditlog
      service-plan: oauth2
  - name: bookshop-ias
    type: org.cloudfoundry.managed-service
    parameters:
      service: identity
      service-name: bookshop-ias
      service-plan: application
      config:
        provided-apis:
          - name: bookshop-ias-api
            description: API exposed by the application
        display-name: DPI Bookshop test
        oauth2-configuration:
          token-policy:
            access-token-format: "jwt"
          redirect-uris:
            - http://localhost:5000/login/callback?authType=ias
            - ~{app-api/app-protocol}://*~{app-api/app-uri}/login/callback
          post-logout-redirect-uris:
            - ~{app-api/app-protocol}://*~{app-api/app-uri}/*/logout.html
        xsuaa-cross-consumption: true
        authorization:
          enabled: true
    requires:
      - name: app-api
