name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Running ${{ matrix.testSuite }} for CAP ${{ matrix.cds-version }} and node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
        cds-version: [latest]
        testSuite: [tests/csn-enhancements, tests/retention, tests/information, tests/build]
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install global CDS
        shell: bash
        run: npm i -g @sap/cds-dk@${{ matrix.cds-version }}
      - name: Install root dependencies
        shell: bash
        run: |
          npm install @sap/cds@${{ matrix.cds-version }}
          npm install
      - name: Install bookshop
        shell: bash
        run: |
          cd ./tests/bookshop-app
          npm link ../../
          npm install
          rm -rf ./node_modules/@sap/cds
      - name: CDS version
        shell: bash
        run: cds v -i
      - name: Run tests
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: npx jest --testPathPatterns ${{ matrix.testSuite }}
